<!DOCTYPE html>
<html>
<head>
  <title>OnX CRM</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #000;
      color: #e5e5e5;
      padding: 15px;
    }

    h1 {
      text-align: center;
      color: #fbbf24;
      margin-bottom: 20px;
    }

    /* Glass UI */
    .glass {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat {
      text-align: center;
    }

    .stat h2 {
      color: #fbbf24;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    input, select, button {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #fbbf24;
      color: black;
      cursor: pointer;
    }

    /* Messages */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
      gap: 10px;
    }

    .card {
      transition: 0.3s;
    }

    .card.read {
      opacity: 0.5;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Mobile */
    @media(max-width:600px) {
      h1 { font-size: 18px; }
    }

  </style>
</head>

<body>

<h1>🚀 OnX CRM Dashboard</h1>

<!-- Stats -->
<div class="stats">
  <div class="glass stat">
    <h2 id="total">0</h2>
    <p>Total</p>
  </div>
  <div class="glass stat">
    <h2 id="unread">0</h2>
    <p>Unread</p>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <input id="search" placeholder="Search...">
  <select id="filter">
    <option value="all">All</option>
    <option value="read">Read</option>
    <option value="unread">Unread</option>
  </select>

  <button onclick="exportExcel()">Export Excel</button>
  <button onclick="exportPDF()">Export PDF</button>
</div>

<!-- Chart -->
<div class="glass">
  <canvas id="chart"></canvas>
</div>

<br>

<!-- Messages -->
<div class="grid" id="messages"></div>

<script>
const API = "https://onxmariners-backend.onrender.com";
const KEY = "admin123";

let messages = [];
let lastCount = 0;

// Load messages
async function load() {
  const res = await fetch(`${API}/api/messages?key=${KEY}`);
  const data = await res.json();

  // 🔔 Notification
  if (data.length > lastCount && lastCount !== 0) {
    alert("🔥 New message received!");
  }
  lastCount = data.length;

  messages = data;
  updateStats();
  render();
  drawChart();
}

// Stats
function updateStats() {
  document.getElementById("total").innerText = messages.length;
  document.getElementById("unread").innerText =
    messages.filter(m => !m.read).length;
}

// Render messages
function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const container = document.getElementById("messages");
  container.innerHTML = "";

  messages
    .filter(m =>
      (m.name.toLowerCase().includes(search) ||
       m.email.toLowerCase().includes(search)) &&
      (filter === "all" ||
       (filter === "read" && m.read) ||
       (filter === "unread" && !m.read))
    )
    .forEach(m => {
      const div = document.createElement("div");
      div.className = "glass card " + (m.read ? "read" : "");

      div.innerHTML = `
        <p><b>${m.name}</b></p>
        <p>${m.email}</p>
        <p>${m.message}</p>
        <button onclick="markRead('${m._id}')">Read</button>
        <button onclick="del('${m._id}')">Delete</button>
      `;

      container.appendChild(div);
    });
}

// Chart
function drawChart() {
  const ctx = document.getElementById('chart');

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Read', 'Unread'],
      datasets: [{
        data: [
          messages.filter(m => m.read).length,
          messages.filter(m => !m.read).length
        ]
      }]
    }
  });
}

// Actions
async function markRead(id) {
  await fetch(`${API}/api/read/${id}?key=${KEY}`, { method: "PUT" });
  load();
}

async function del(id) {
  await fetch(`${API}/api/delete/${id}?key=${KEY}`, { method: "DELETE" });
  load();
}

// Export Excel
function exportExcel() {
  let csv = "Name,Email,Message\n";
  messages.forEach(m => {
    csv += `${m.name},${m.email},${m.message}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "messages.csv";
  a.click();
}

// Export PDF
function exportPDF() {
  window.print();
}

// Events
document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

// Auto refresh every 10s
setInterval(load, 10000);

load();
</script>

</body>
</html>

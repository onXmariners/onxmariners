<!DOCTYPE html>
<html>
<head>
  <title>OnX CRM</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #000;
      color: #e5e5e5;
      padding: 15px;
    }

    h1 {
      text-align: center;
      color: #fbbf24;
      margin-bottom: 20px;
    }

    /* Glass UI */
    .glass {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat {
      text-align: center;
    }

    .stat h2 {
      color: #fbbf24;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    input, select, button {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #fbbf24;
      color: black;
      cursor: pointer;
    }

    /* Messages */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
      gap: 10px;
    }

    .card {
      transition: 0.3s;
    }

    .card.read {
      opacity: 0.5;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Mobile */
    @media(max-width:600px) {
      h1 { font-size: 18px; }
    }

  </style>
</head>

<body>

<h1>🚀 OnXmariners CRM Dashboard</h1>
<!-- Notification -->
<div style="position:fixed; top:20px; right:20px;">
  🔔 <span id="notifCount">0</span>
</div>

<!-- Stats -->
<div class="stats">
  <div class="glass stat">
    <h2 id="total">0</h2>
    <p>Total</p>
  </div>
  <div class="glass stat">
    <h2 id="unread">0</h2>
    <p>Unread</p>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <input id="search" placeholder="Search...">
  <select id="filter">
    <option value="all">All</option>
    <option value="read">Read</option>
    <option value="unread">Unread</option>
  </select>

  <button onclick="exportExcel()">Export Excel</button>
  <button onclick="exportPDF()">Export PDF</button>
  <button onclick="openReply('${m.email}')">Reply</button>
</div>

<!-- Chart -->
<div class="glass">
</div>

<br>

<!-- Messages -->
<div class="grid" id="messages"></div>

<script>
const API = "https://onxmariners-backend.onrender.com";
const KEY = "admin123";

let messages = [];
let lastCount = 0;

// Load messages
async function load() {
  const res = await fetch(`${API}/api/messages?key=${KEY}`);
  const data = await res.json();

  // 🔔 Notification
  if (data.length > lastCount && lastCount !== 0) {
  const newCount = data.length - lastCount;
  document.getElementById("notifCount").innerText = newCount;
}
  lastCount = data.length;

  messages = data;
  updateStats();
  render();
}

// ---- reply function ----

async function reply(email) {
  const message = prompt("Enter your reply:");

  if (!message) return;

  await fetch(`${API}/api/reply?key=${KEY}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      to: email,
      message
    })
  });

  alert("Email sent!");
}


// Stats
function updateStats() {
  document.getElementById("total").innerText = messages.length;
  document.getElementById("unread").innerText =
    messages.filter(m => !m.read).length;
}

// Render messages
function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const container = document.getElementById("messages");
  container.innerHTML = "";

  messages
    .filter(m =>
      (m.name.toLowerCase().includes(search) ||
       m.email.toLowerCase().includes(search)) &&
      (filter === "all" ||
       (filter === "read" && m.read) ||
       (filter === "unread" && !m.read))
    )
    .forEach(m => {
      const div = document.createElement("div");
      div.className = "glass card " + (m.read ? "read" : "");

      div.innerHTML = `
  <p><b>${m.name}</b></p>
  <p>${m.email}</p>
  <p>${m.message}</p>
  <p style="font-size:12px;color:gray;">
    ${new Date(m.createdAt).toLocaleString()}
  </p>
  <button onclick="markRead('${m._id}')">Read</button>
  <button onclick="del('${m._id}')">Delete</button>
`;

      container.appendChild(div);
    });
}

// Chart
function drawChart() {
  const ctx = document.getElementById('chart');

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Read', 'Unread'],
      datasets: [{
        data: [
          messages.filter(m => m.read).length,
          messages.filter(m => !m.read).length
        ]
      }]
    }
  });
}

// Actions for mark read and delete
async function markRead(id) {
  const res = await fetch(`${API}/api/read/${id}?key=${KEY}`, {
    method: "PUT"
  });

  const data = await res.json();
  console.log(data);

  load();
}

async function del(id) {
  const res = await fetch(`${API}/api/delete/${id}?key=${KEY}`, {
    method: "DELETE"
  });

  const data = await res.json();
  console.log(data);

  load();
}


// Export Excel
function exportExcel() {
  let csv = "Name,Email,Message,Date\n";

  messages.forEach(m => {
    const date = new Date(m.createdAt).toLocaleString();
    csv += `${m.name},${m.email},${m.message},${date}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "messages.csv";
  a.click();
}

// Export PDF
function exportPDF() {
  let content = "<h2>Messages</h2>";

  messages.forEach(m => {
    content += `
      <p>
        <b>${m.name}</b><br>
        ${m.email}<br>
        ${m.message}<br>
        <small>${new Date(m.createdAt).toLocaleString()}</small>
      </p><hr>
    `;
  });

  const win = window.open("", "", "width=800,height=600");
  win.document.write(content);
  win.print();
}

// Events
document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

// Auto refresh every 10s
setInterval(load, 10000);

load();

// ---- Modal for openReply ----

let currentEmail = "";

function openReply(email) {
  currentEmail = email;

  document.getElementById("replyModal").style.display = "flex";
  document.getElementById("replyTo").innerText = "To: " + email;
}

function closeModal() {
  document.getElementById("replyModal").style.display = "none";
}

async function sendReply() {
  const subject = document.getElementById("replySubject").value;
  const message = document.getElementById("replyMessage").value;

  if (!message) return alert("Message required");

  const res = await fetch(`${API}/api/reply?key=${KEY}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      to: currentEmail,
      subject,
      message
    })
  });

  const data = await res.json();

  if (data.success) {
    alert("✅ Email sent successfully");
    closeModal();
  } else {
    alert("❌ Failed to send email");
  }
}


</script>

<div id="replyModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:#111;
    padding:20px;
    border-radius:12px;
    width:400px;
  ">

    <h3>Reply Email</h3>

    <p id="replyTo"></p>

    <input id="replySubject" placeholder="Subject" style="width:100%; margin-bottom:10px;">

    <textarea id="replyMessage" placeholder="Write your message..."
      style="width:100%; height:100px;"></textarea>

    <br><br>

    <button onclick="sendReply()">Send</button>
    <button onclick="closeModal()">Cancel</button>

  </div>
</div>

</body>
</html>

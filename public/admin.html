<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>📩 Messages Dashboard</h1>

<div id="messages"></div>

<script>
const ADMIN_KEY = "admin123"; // simple protection

fetch(`https://onxmariners-backend.onrender.com/api/messages?key=${ADMIN_KEY}`)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("messages");

    if (data.length === 0) {
      container.innerHTML = "<p>No messages yet</p>";
      return;
    }

    data.forEach(msg => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <p><strong>Name:</strong> ${msg.name}</p>
        <p><strong>Email:</strong> ${msg.email}</p>
        <p><strong>Project:</strong> ${msg.projectType || "N/A"}</p>
        <p><strong>Message:</strong> ${msg.message}</p>
        <p><small>${new Date(msg.createdAt).toLocaleString()}</small></p>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
